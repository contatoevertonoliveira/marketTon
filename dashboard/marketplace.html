        { id:"T005", nome:"Luvas Touchscreen Inverno", modalidade:"Revenda", receita:1300, margem:45, concorrencia:"Baixa-Média", tendencia:82, fornecedor:"Dhgate (Gold Supplier)", comissao:null, justificativa:"Sazonalidade forte de maio a agosto.", preco:29.9, custo:15.0, prazo:"20-30 dias", prob:"Média-Alta", variancia:"Baixa", marketplace:"Shopee + Amazon", copy:"Frio sem deixar o celular na mão. Pontos condutivos no dedo.", oldPrice:44.9, desconto:33, avaliacao:8, reviews:870, img:"https://images.unsplash.com/photo-1545594861-3bef43ff22f6?w=600&h=400&fit=crop", thumbs:["https://images.unsplash.com/photo-1545594861-3bef43ff22f6?w=120&h=120&fit=crop"] },
        { id:"T006", nome:"Kit Plantas Artificiais 3un", modalidade:"Dropshipping", receita:1500, margem:52, concorrencia:"Baixa", tendencia:79, fornecedor:"CJDropshipping", comissao:null, justificativa:"Decoração com apelo visual alto para redes sociais.", preco:49.9, custo:22.0, prazo:"7-12 dias", prob:"Média", variancia:"Baixa", marketplace:"Shopee + Mercado Livre", copy:"De verde sem trabalho. Vaso incluso, realista ao toque.", oldPrice:74.9, desconto:33, avaliacao:8, reviews:610, img:"https://images.unsplash.com/photo-1459411552884-841db9b3cc2b?w=600&h=400&fit=crop", thumbs:["https://images.unsplash.com/photo-1459411552884-841db9b3cc2b?w=120&h=120&fit=crop"] }
      ]
    };

    let currentTab = "Selecionados";
    let selectedId = null;
    let selectedImg = null;

    function formatCurrency(v) { return "R$ " + v.toFixed(2); }

    function switchTab(tab) {
      currentTab = tab;
      selectedId = null;
      selectedImg = null;
      document.querySelectorAll(".tab").forEach((el, idx) => {
        el.classList.toggle("active", ["Selecionados","Monitorados","Tendencias"][idx] === tab);
      });
      renderGrid();
      renderDetail();
    }

    function renderGrid() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      produtos[currentTab].forEach(p => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img class="card-img" src="${p.img}" alt="${p.nome}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22200%22><rect width=%22300%22 height=%22200%22 fill=%22%23e5e5e5%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2214%22 fill=%22%23888%22>Sem imagem</text></svg>'"/>
          <div style="font-weight:700; margin-top:6px; font-size:14px;">${p.nome}</div>
          <div class="price">${formatCurrency(p.preco)}<span class="old-price">${formatCurrency(p.oldPrice)}</span><span class="discount">-${p.desconto}%</span></div>
          <div class="meta">⭐ 4.${p.avaliacao} (${p.reviews})</div>
          <div class="meta">🚚 Frete grátis</div>
          <span class="tag">${p.modalidade}</span>
          <span class="tag blue">${p.marketplace}</span>
        `;
        card.onclick = () => selectProduct(p.id, p.img);
        grid.appendChild(card);
      });
    }

    function selectProduct(id, img) {
      selectedId = id;
      selectedImg = img;
      renderDetail();
    }

    function renderDetail() {
      const container = document.getElementById("detail");
      if (!selectedId) {
        container.className = "empty";
        container.innerHTML = "Selecione um produto para ver o anúncio e os detalhes.";
        return;
      }
      const source = produtos["Selecionados"].concat(produtos["Monitorados"], produtos["Tendencias"]);
      const p = source.find(x => x.id === selectedId);
      if (!p) return;
      const lucro = p.preco - p.custo;
      container.className = "detail";
      container.innerHTML = `
        <div class="ad-banner">
          <img class="ad-main-img" src="${selectedImg || p.img}" alt="${p.nome}" onerror="this.src='${p.img}'"/>
          <div class="ad-body">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <div>
                <span class="badge">${p.modalidade}</span>
                <span class="badge blue">${p.marketplace}</span>
              </div>
              <div class="ad-meta">⭐ 4.${p.avaliacao} • ${p.reviews} avaliações</div>
            </div>
            <h2 class="ad-title">${p.nome}</h2>
            <div class="ad-price">${formatCurrency(p.preco)}<span class="ad-old">${formatCurrency(p.oldPrice)}</span><span class="ad-old" style="text-decoration:none; color:#c62828; font-weight:700;">-${p.desconto}%</span></div>
            <div class="ad-meta">🚚 Frete grátis • 🛡️ Garantia de 30 dias</div>
            <div class="ad-actions">
              <button class="btn btn-buy" onclick="alert('Redirecionar para compra...')">Comprar agora</button>
              <button class="btn btn-cart" onclick="alert('Adicionar ao carrinho...')">Adicionar ao carrinho</button>
            </div>
            ${p.thumbs && p.thumbs.length ? `
              <div class="thumbs">
                ${p.thumbs.map((t,i) => `<img class="thumb ${i===0?'active':''}" src="${t}" onclick="switchThumb(this, '${t.replace(/'/g, "\\'")}')"/>`).join("")}
              </div>
            ` : ""}
          </div>
        </div>

        <div class="section">
          <b>Informações do anúncio</b>
          <div class="copy-box">${p.copy}</div>
        </div>

        <div class="section">
          <b>Operacional</b>
          <ul style="margin:6px 0 0 16px; padding:0; font-size:13px; color:#444;">
            <li>Fornecedor: <b>${p.fornecedor}</b></li>
            <li>Prazo: <b>${p.prazo}</b></li>
            <li>Justificativa: <b>${p.justificativa}</b></li>
          </ul>
        </div>

        <div class="section">
          <b>Prognóstico</b>
          <ul style="margin:6px 0 0 16px; padding:0; font-size:13px; color:#444;">
            <li>Probabilidade: <b>${p.prob}</b></li>
            <li>Variância: <b>${p.variancia}</b></li>
            <li>Tendência: <b>${p.tendencia}/100</b></li>
            <li>Concorrência: <b>${p.concorrencia}</b></li>
          </ul>
        </div>

        <div class="section">
          <b>Financeiro</b>
          <ul style="margin:6px 0 0 16px; padding:0; font-size:13px; color:#444;">
            <li>Preço: <b>${formatCurrency(p.preco)}</b></li>
            <li>Custo: <b>${formatCurrency(p.custo)}</b></li>
            <li>Lucro unitário: <b>${formatCurrency(lucro)}</b></li>
            <li>Margem: <b>${p.margem}%</b></li>
            <li>Receita estimada 30d: <b>${formatCurrency(p.receita)}</b></li>
            ${p.comissao != null ? `<li>Comissão afiliado: <b>${p.comissao}%</b></li>` : ""}
          </ul>
        </div>

        <div class="section" style="display:flex; gap:8px;">
          <button class="btn btn-buy" style="flex:1;" onclick="alert('Aprovado: ${p.nome.replace(/'/g, "\\'")}')">✅ Aprovar</button>
          <button class="btn btn-cart" style="flex:1; background:#ef6c00;" onclick="alert('Reanálise: ${p.nome.replace(/'/g, "\\'")}')">🔎 Reanalisar</button>
          <button class="btn" style="flex:1; background:#c62828;" onclick="alert('Cancelado: ${p.nome.replace(/'/g, "\\'")}')">❌ Cancelar</button>
        </div>
      `;
    }

    function switchThumb(el, src) {
      document.querySelectorAll(".thumb").forEach(t => t.classList.remove("active"));
      el.classList.add("active");
      const main = document.querySelector(".ad-main-img");
      if (main) main.src = src;
    }

    renderGrid();
  </script>
</body>
</html>
